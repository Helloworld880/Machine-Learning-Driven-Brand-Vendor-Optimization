version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: vendorinsight-postgres
    environment:
      POSTGRES_DB: vendor_insight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vendor_insight"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vendorinsight-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    container_name: vendorinsight-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/vendor_insight
      REDIS_URL: redis://redis:6379/0
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build: .
    container_name: vendorinsight-streamlit
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    command: streamlit run app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
